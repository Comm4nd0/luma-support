name: backend

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff==0.15.15

      - name: Ruff lint
        run: ruff check --output-format=github .

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install scanners
        run: pip install pip-audit==2.7.3 bandit==1.7.9

      # Dependency CVE scan. Non-blocking for now so a freshly-disclosed CVE
      # in a pinned dep doesn't wedge unrelated PRs; review the report and
      # tighten to blocking once the baseline is clean.
      - name: pip-audit (dependencies)
        continue-on-error: true
        run: pip-audit -r requirements.txt

      # Static security lint. -ll = report medium+ severity only.
      - name: bandit (source)
        continue-on-error: true
        run: bandit -ll -r . -x ./mobile,./.venv

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest-cov==5.0.0

      - name: Collect static files (needed by some portal tests)
        env:
          DJANGO_SECRET_KEY: ci-secret
          DJANGO_DEBUG: "1"
          POSTGRES_HOST: ""
        run: python manage.py collectstatic --noinput

      - name: Run pytest
        env:
          DJANGO_SECRET_KEY: ci-secret
          POSTGRES_HOST: ""
        run: pytest -ra --cov --cov-report=term-missing --cov-report=xml

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore
