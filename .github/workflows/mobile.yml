name: mobile

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  pull_request:
    branches: [master, main]
    paths:
      - "mobile/**"
      - ".github/workflows/mobile.yml"

defaults:
  run:
    working-directory: mobile

env:
  FLUTTER_VERSION: "3.22.x"

jobs:
  analyze-and-test:
    name: lint + unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      # Platform folders aren't committed (generated by Marco's first
      # `flutter create`). Recreate them here so `pub get` / `analyze`
      # can resolve native plugin code without committing platform noise.
      - name: Generate platform folders for CI
        run: |
          flutter create --platforms=ios,android --org com.lumatechsolutions \
            --project-name luma_support_mobile .

      - name: Resolve dependencies
        run: flutter pub get

      - name: Analyzer
        run: flutter analyze

      - name: Unit + widget tests
        run: flutter test --reporter expanded

  android-build:
    name: Android AAB (tag only)
    runs-on: ubuntu-latest
    needs: analyze-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Generate platform folders
        run: |
          flutter create --platforms=ios,android --org com.lumatechsolutions \
            --project-name luma_support_mobile .

      - name: Decode upload keystore (if present)
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
          else
            echo "ANDROID_KEYSTORE_BASE64 not set — building unsigned debug artifact"
          fi

      - name: Build AAB
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          API_BASE: ${{ secrets.PROD_API_BASE }}
        run: |
          flutter pub get
          flutter build appbundle --release \
            --dart-define=API_BASE=${API_BASE:-https://api.lumatechsolutions.co.uk/api/v1}

      - uses: actions/upload-artifact@v4
        with:
          name: app-release.aab
          path: mobile/build/app/outputs/bundle/release/app-release.aab

  ios-build:
    name: iOS IPA (tag only)
    runs-on: macos-14
    needs: analyze-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Generate platform folders
        run: |
          flutter create --platforms=ios,android --org com.lumatechsolutions \
            --project-name luma_support_mobile .

      - name: Install fastlane
        run: |
          gem install fastlane bundler

      - name: Fetch signing certs via fastlane match
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          fastlane match appstore --readonly --git_url "$MATCH_GIT_URL"

      - name: Build IPA
        env:
          API_BASE: ${{ secrets.PROD_API_BASE }}
        run: |
          flutter pub get
          flutter build ipa --release \
            --dart-define=API_BASE=${API_BASE:-https://api.lumatechsolutions.co.uk/api/v1}

      - uses: actions/upload-artifact@v4
        with:
          name: app-release.ipa
          path: mobile/build/ios/ipa/*.ipa
